AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Auth Manager - Serverless Authentication Service

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Description: Deployment environment

  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string (Neon)

  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT secret key (32+ characters)

Resources:
  # ============================================================================
  # Lambda Function
  # ============================================================================
  AuthManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'auth-manager-${Environment}'
      PackageType: Zip
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: ../target/lambda/auth-manager/
      Timeout: 30
      MemorySize: 1024
      Architectures:
        - x86_64
      Tracing: Active
      Environment:
        Variables:
          APP_ENV: !Ref Environment
          DATABASE_URL: !Ref DatabaseUrl
          JWT_SECRET: !Ref JwtSecret
          RUST_LOG: !If [IsProd, info, debug]
      Events:
        HttpApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
            ApiId: !Ref HttpApi
        HttpApiRootEvent:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
            ApiId: !Ref HttpApi
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSXRayDaemonWriteAccess
      Tags:
        Environment: !Ref Environment
        Application: auth-manager

  # ============================================================================
  # API Gateway HTTP API
  # ============================================================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogs.Arn
        Format: '$context.requestId $context.error.message $context.error.messageString'
      Tags:
        Environment: !Ref Environment
        Application: auth-manager

  # ============================================================================
  # CloudWatch Logs
  # ============================================================================
  ApiAccessLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/auth-manager-${Environment}'
      RetentionInDays: !If [IsProd, 30, 7]

  FunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/auth-manager-${Environment}'
      RetentionInDays: !If [IsProd, 30, 7]

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Outputs:
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt AuthManagerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FunctionArn'

  ApiUrl:
    Description: API Gateway Endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  ApiId:
    Description: API Gateway ID
    Value: !Ref HttpApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiId'
